<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4 text-center" style="max-width: 500px; width: 100%;">
      <h2 class="mb-4">Perfil protegido</h2>
      <p class="text-muted">Esta vista solo debe funcionar con un token válido.</p>

      <div class="d-grid gap-2">
        <button id="perfilBtn" class="btn btn-primary">Ver perfil</button>
        <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
